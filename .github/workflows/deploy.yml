name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.0'

      - name: Install dependencies
        working-directory: EMS-Frontend
        run: npm install --legacy-peer-deps --no-engine-strict

      - name: Build Angular app
        working-directory: EMS-Frontend
        run: npx ng build --base-href=/EMS/

      - name: List build output (debug)
        working-directory: EMS-Frontend
        run: |
          ls -la dist/ || echo "dist not found"
          ls -R dist/ems/ || echo "dist/ems not found"
          mkdir -p dist/ems/browser && touch dist/ems/browser/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: EMS-Frontend/dist/ems/browser

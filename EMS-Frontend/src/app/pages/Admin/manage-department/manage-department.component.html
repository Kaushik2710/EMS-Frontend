<div class="container mt-3">
  <div class="row">
    <h2 class="fw-bold fs-4 text-muted">Department</h2>
    <hr />
  </div>
</div>
<mat-card class="m-auto">
  <mat-card-header>
    <div fxFlex="45" fxFlex.lt-md="100" class="mb5">
      <mat-form-field class="w-75">
        <input
          matInput
          type="text"
          placeholder="Search here..."
          (keyup)="filterChange($event)"
        />
        <button matSuffix mat-icon-button color="primary">
          <mat-icon class="search-icon">search</mat-icon>
        </button>
      </mat-form-field>
    </div>
    <div class="d-flex ms-auto align-items-center">
      <div class="me-2">
        <button
          mat-mini-fab
          color="primary"
          matTooltip="Add New Department"
          (click)="addDepartment()"
        >
          <mat-icon>add</mat-icon>
        </button>
      </div>
    </div>
  </mat-card-header>
  <mat-card-content>
    <table
      matSort
      mat-table
      [dataSource]="dataSource"
      class="mat-elevation-z8 demo-table"
      id="table"
    >
      <ng-container matColumnDef="no">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>
      <ng-container matColumnDef="departmentName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Department Name
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element.departmentName }}
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let element">
          <div class="d-flex">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Edit row"
              (click)="editDepartment(element)"
            >
              <mat-icon>edit</mat-icon>
            </button>

            <button
              mat-icon-button
              color="primary"
              matTooltip="Delete Department"
              (click)="removeDepartment(element.dept_id)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayColumns"
        class="table-row"
      ></tr>
    </table>
  </mat-card-content>
  <br />
  <mat-card-footer>
    <mat-paginator
      [pageSizeOptions]="[5, 10, 15]"
      showFirstLastButtons
    ></mat-paginator>
  </mat-card-footer>
</mat-card>
